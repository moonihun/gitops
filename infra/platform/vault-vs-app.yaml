apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault-vs
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/moonihun/gitops.git
    targetRevision: main
    path: infra/vault/config
  destination:
    server: https://kubernetes.default.svc
    namespace: vault
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
