apiVersion: argoproj.io/v1alpha1
kind: Application 
metadata:
  name: vault-app
  namespace: argocd 
spec:
  project: default 
  source:
    repoURL: https://helm.releases.hashicorp.com 
    chart: vault 
    targetRevision: "0.32.0"
    helm:
      valueFiles:
        - infra/values/vault-values.yaml
  destination:
    server: https://kubernetes.default.svc 
    namespace: vault 
  syncPolicy:
    automated: 
      prune: true 
      selfHeal: true 
    syncOptions:
      - CreeateNamespace=true
