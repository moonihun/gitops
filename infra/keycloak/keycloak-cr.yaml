apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: keycloak
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  instances: 1
  db:
    vendor: postgres
    host: keycloak-postgres.keycloak.svc.cluster.local
    port: 5432
    database: keycloak
    usernameSecret:
      name: keycloak-db-credentials
      key: username
    passwordSecret:
      name: keycloak-db-credentials
      key: password
  http:
    enabled: true
    httpEnabled: true
  proxy:
    headers: xforwarded    # Istio Gateway 뒤에서 필수
  startOptimized: false
  hostname:
    hostname: keycloak.cluster.wooju.org

