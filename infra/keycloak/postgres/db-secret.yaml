apiVersion: external-secrets.io/v1 
kind: ExternalSecret 
metadata:
  name: keycloak-db-credentials 
  namespace: keycloak 
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore 
  target:
    name: keycloak-db-credentials 
    creationPolicy: Owner 
  data:
    - secretKey: username
      remoteRef:
        key: secret/prod/keycloak 
        property: pg-username
    - secretKey: password 
      remoteRef:
        key: secret/prod/keycloak 
        property: pg-password 
